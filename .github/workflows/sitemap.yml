name: Generate sitemap

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/generate-sitemap.sh'
      - '.github/workflows/sitemap.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap
        run: bash scripts/generate-sitemap.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Regenerate sitemap.xml [skip ci]"
          git push
